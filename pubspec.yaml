name: flutter_challenge
description: Yindii Flutter intern coding challenge — surplus food marketplace mini-app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  http: ^1.2.1
  flutter_screenutil: ^5.9.0
  shared_preferences: ^2.2.3
  cached_network_image: ^3.3.1
  pull_to_refresh: ^2.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/language/
    - assets/mock/
